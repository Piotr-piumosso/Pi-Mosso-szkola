<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dziennik zajęć</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#f5f5f5;color:#111;max-width:600px;margin:0 auto;min-height:100vh}
    header{background:#1C1C2E;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    header h1{font-size:17px;font-weight:700}
    .token-btn{background:rgba(255,255,255,.14);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
    .card{background:#fff;border-radius:14px;padding:20px;margin:14px}
    .label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#aaa;margin-bottom:14px}
    input[type=text],input[type=password]{width:100%;padding:13px 14px;border:1.5px solid #e5e5e5;border-radius:10px;font-size:16px;font-family:inherit;outline:none;margin-bottom:12px}
    input:focus{border-color:#1C1C2E}
    .inst-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
    .inst-btn{padding:12px 6px;border:1.5px solid #e5e5e5;border-radius:10px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center;color:#555;line-height:1.4}
    .inst-btn.active{background:#1C1C2E;color:#fff;border-color:#1C1C2E}
    .gen-box{background:#f9f9f9;border:1.5px solid #eee;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
    .gen-box .meta{font-size:12px;color:#999;margin-bottom:2px}
    .gen-box strong{font-size:15px;color:#111}
    .copy-btn{background:#eee;border:none;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
    .copy-btn:active{background:#ddd}
    .btn-primary{width:100%;background:#1C1C2E;color:#fff;border:none;padding:15px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
    .btn-primary:active{opacity:.85}
    .student-row{padding:14px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
    .student-row:last-child{border-bottom:none}
    .student-row h3{font-size:16px;font-weight:700}
    .student-row p{font-size:13px;color:#999;margin-top:2px}
    .start-btn{background:#1C1C2E;color:#fff;border:none;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
    .empty{text-align:center;padding:40px 20px;color:#ccc;font-size:15px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:100}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:28px 20px;width:100%}
    .sheet-title{font-size:19px;font-weight:800;margin-bottom:6px}
    .sheet-sub{font-size:14px;color:#888;line-height:1.6;margin-bottom:20px}
    .btn-ghost{width:100%;background:none;border:none;padding:12px;font-size:15px;color:#aaa;cursor:pointer;font-family:inherit;margin-top:4px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<header>
  <h1>Dziennik zajęć</h1>
  <button class="token-btn" id="token-btn" onclick="openTokenModal()">⚙ Klucz GitHub</button>
</header>

<div class="card">
  <div class="label">Dodaj ucznia</div>
  <input type="text" id="name" placeholder="Imię i nazwisko">
  <div class="inst-grid">
    <div class="inst-btn" onclick="pickInst(this,'Fortepian')">🎹<br>Fortepian</div>
    <div class="inst-btn" onclick="pickInst(this,'Saksofon')">🎷<br>Saksofon</div>
    <div class="inst-btn" onclick="pickInst(this,'Akordeon')">🪗<br>Akordeon</div>
  </div>
  <div id="gen" style="display:none">
    <div class="gen-box">
      <div><div class="meta">Login ucznia</div><strong id="gen-login"></strong></div>
      <button class="copy-btn" onclick="copyEl('gen-login')">Kopiuj</button>
    </div>
    <div class="gen-box">
      <div><div class="meta">Hasło dla rodzica</div><strong id="gen-pass"></strong></div>
      <button class="copy-btn" onclick="copyEl('gen-pass')">Kopiuj</button>
    </div>
  </div>
  <button class="btn-primary" onclick="addStudent()">Dodaj ucznia</button>
</div>

<div class="card">
  <div class="label">Uczniowie</div>
  <div id="list"><div class="empty">Brak uczniów. Dodaj pierwszego powyżej.</div></div>
</div>

<div class="overlay" id="token-modal">
  <div class="sheet">
    <div class="sheet-title">Klucz GitHub</div>
    <div class="sheet-sub">Wklej Personal Access Token (fine-grained, repo Pi-Mosso-szkola, uprawnienia Contents: read + write).</div>
    <input type="password" id="token-val" placeholder="ghp_...">
    <button class="btn-primary" onclick="saveToken()">Zapisz klucz</button>
    <button class="btn-ghost" onclick="closeTokenModal()">Anuluj</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REPO='Piotr-piumosso/Pi-Mosso-szkola', API='https://api.github.com';
let students=[], inst='';

async function ghGet(p){
  const r=await fetch(`${API}/repos/${REPO}/contents/${p}`,{headers:{Authorization:`token ${localStorage.gh_token}`,Accept:'application/vnd.github.v3+json'}});
  if(!r.ok)throw r.status;
  const d=await r.json();
  return{content:JSON.parse(atob(d.content.replace(/\n/g,''))),sha:d.sha};
}
async function ghPut(p,content,sha,msg){
  const body={message:msg,content:btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2))))};
  if(sha)body.sha=sha;
  const r=await fetch(`${API}/repos/${REPO}/contents/${p}`,{method:'PUT',headers:{Authorization:`token ${localStorage.gh_token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw await r.text();
}

async function load(){
  try{const d=await ghGet('data/students.json');students=d.content.students||[];render();}
  catch(e){students=[];render();}
}

function render(){
  const el=document.getElementById('list');
  if(!students.length){el.innerHTML='<div class="empty">Brak uczniów. Dodaj pierwszego powyżej.</div>';return;}
  el.innerHTML=students.map(s=>`
    <div class="student-row">
      <div><h3>${s.name}</h3><p>${s.instrument} · ${s.login}</p></div>
      <button class="start-btn" onclick="startLesson('${s.id}')">Zajęcia →</button>
    </div>`).join('');
}

function pickInst(el,name){
  document.querySelectorAll('.inst-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); inst=name;
}

async function addStudent(){
  const name=document.getElementById('name').value.trim();
  if(!name){toast('Wpisz imię i nazwisko');return;}
  if(!inst){toast('Wybierz instrument');return;}
  const login=name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const pass='Piumosso-'+Math.floor(1000+Math.random()*9000);
  const id=login+'-'+Date.now();
  document.getElementById('gen-login').textContent=login;
  document.getElementById('gen-pass').textContent=pass;
  document.getElementById('gen').style.display='block';
  try{
    let sha=null;
    try{const ex=await ghGet('data/students.json');students=ex.content.students||[];sha=ex.sha;}catch(e){}
    students.push({id,name,instrument:inst,login,parentPassword:pass,createdAt:new Date().toISOString().split('T')[0]});
    await ghPut('data/students.json',{students},sha,`Dodano ucznia: ${name}`);
    await ghPut(`data/lessons/${id}.json`,{studentId:id,lessons:[]},null,`Inicjalizacja: ${name}`);
    render();
    document.getElementById('name').value='';
    document.querySelectorAll('.inst-btn').forEach(b=>b.classList.remove('active'));
    inst=''; toast('Uczeń dodany!');
  }catch(e){toast('Błąd zapisu. Sprawdź klucz GitHub.');console.error(e);}
}

function startLesson(id){
  const s=students.find(x=>x.id===id);
  if(!s)return;
  sessionStorage.setItem('lesson_student',JSON.stringify(s));
  location.href='zajecia.html';
}

function openTokenModal(){
  document.getElementById('token-modal').classList.add('show');
  if(localStorage.gh_token)document.getElementById('token-val').value=localStorage.gh_token;
}
function closeTokenModal(){document.getElementById('token-modal').classList.remove('show');}
function saveToken(){
  const v=document.getElementById('token-val').value.trim();
  if(!v)return;
  localStorage.gh_token=v;
  document.getElementById('token-btn').textContent='✓ Klucz GitHub';
  closeTokenModal(); load();
}

function copyEl(id){navigator.clipboard.writeText(document.getElementById(id).textContent).then(()=>toast('Skopiowano!'));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

if(localStorage.gh_token){document.getElementById('token-btn').textContent='✓ Klucz GitHub';load();}
else openTokenModal();
</script>
</body>
</html>
